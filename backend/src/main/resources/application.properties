spring.application.name=backend
server.port=8080
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

football-data.base-url=https://api.football-data.org/v4
football-data.api-key=${FOOTBALL_DATA_API_KEY:}

fixture-sync.enabled=${FIXTURE_SYNC_ENABLED:false}
fixture-sync.initial-delay=${FIXTURE_SYNC_INITIAL_DELAY:15s}
fixture-sync.fixed-delay=${FIXTURE_SYNC_FIXED_DELAY:1m}
fixture-sync.competitions=${FIXTURE_SYNC_COMPETITIONS:WC,EC,CL,PL,BL1,DED,BSA,PD,FL1,ELC,PPL,SA}